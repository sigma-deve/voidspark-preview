<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>VOIDSPARK | v9.1 Terminal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <canvas id="matrix-canvas"></canvas>

    <header>
        <div class="logo">VOIDSPARK</div>
        <nav>
            <span style="margin: 0 15px;">[ PLANS ]</span>
            <span style="margin: 0 15px;">[ STATUS ]</span>
            <span style="margin: 0 15px;">[ CONSOLE ]</span>
        </nav>
    </header>

    <main class="hero">
        <h1>System Initialized</h1>
        <p style="color: #fff; opacity: 0.7;">High Performance Game Hosting. Low Latency. Zero Downtime.</p>
        
        <div class="status-box">
            STATUS: [ <span style="color: #0F0;">ONLINE</span> ]
        </div>

        <div class="buttons">
            <button class="cta-btn">Deploy Server</button>
            <button class="cta-btn" style="border-color: var(--neon-blue); color: var(--neon-blue);">View Plans</button>
        </div>
    </main>

    <script>
        const canvas = document.getElementById('matrix-canvas');
        const ctx = canvas.getContext('2d');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const alphabet = "ｦｱｳｴｵｶｷｸｹｺｻｼｽｾｿﾀﾁﾂﾃﾄﾅﾆﾇﾈﾉﾊﾋﾌﾍﾎﾏﾐﾑﾒﾓﾔﾕﾖﾗﾘﾙﾚﾛﾜﾝ1234567890";
        const fontSize = 16;
        const columns = canvas.width / fontSize;
        const rainDrops = Array.from({ length: columns }).fill(1);

        const draw = () => {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = '#0F0';
            ctx.font = fontSize + 'px monospace';

            for (let i = 0; i < rainDrops.length; i++) {
                const text = alphabet.charAt(Math.floor(Math.random() * alphabet.length));
                ctx.fillText(text, i * fontSize, rainDrops[i] * fontSize);

                if (rainDrops[i] * fontSize > canvas.height && Math.random() > 0.975) {
                    rainDrops[i] = 0;
                }
                rainDrops[i]++;
            }
        };

        setInterval(draw, 30);
    </script>
</body>
</html>
