<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VoidSpark | Next Gen Hosting</title>
    <link rel="stylesheet" href="style.css">
    <!-- Ye line Google Fonts se Matrix jaisa font lane ke liye hai -->
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
</head>
<body>

    <!-- Ye canvas Matrix rain effect dikhayega, script.js se control hoga -->
    <canvas id="matrix"></canvas>

    <div class="main-container">
        <header>
            <div class="logo glitch" data-text="VOIDSPARK">VOIDSPARK</div>
            <nav>
                <a href="#plans">[ PLANS ]</a>
                <a href="#status">[ STATUS ]</a>
                <a href="#support">[ SUPPORT ]</a>
                <a href="#" class="login-btn">CONSOLE LOGIN</a>
            </nav>
        </header>

        <main class="hero">
            <h1 class="scanner-text">System Initialized: VoidSpark v9.1</h1>
            <p class="fade-in">High Performance Game Hosting. Low Latency. Zero Downtime.</p>
            <p class="status-ok">STATUS: [ ONLINE ]</p>
            <div class="btn-group">
                <button class="cta-btn pulse">DEPLOY SERVER</button>
                <button class="cta-btn secondary">VIEW PLANS</button>
            </div>
        </main>
    </div>

    <!-- Ye script Matrix animation chalati hai -->
    <script>
        const canvas = document.getElementById('matrix');
        const context = canvas.getContext('2d');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const katakana = 'アァカサタナハマヤャラワガザダバパイィキシチニヒミリヰギジヂビピウゥクスツヌフムユュルグズブヅプエェケセテネヘメレヱゲゼデベペオォコソトノホモヨョロヲゴゾドボポヴッン';
        const latin = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
        const nums = '0123456789';
        const alphabet = katakana + latin + nums;

        const fontSize = 16;
        const columns = canvas.width / fontSize;
        const rainDrops = [];

        for( let x = 0; x < columns; x++ ) {
            rainDrops[x] = 1;
        }

        const draw = () => {
            context.fillStyle = 'rgba(0, 0, 0, 0.05)';
            context.fillRect(0, 0, canvas.width, canvas.height);

            context.fillStyle = '#0F0';
            context.font = fontSize + 'px monospace';

            for(let i = 0; i < rainDrops.length; i++) {
                const text = alphabet.charAt(Math.floor(Math.random() * alphabet.length));
                context.fillText(text, i * fontSize, rainDrops[i] * fontSize);

                if(rainDrops[i] * fontSize > canvas.width && Math.random() > 0.975){
                    rainDrops[i] = 0;
                }
                rainDrops[i]++;
            }
        };
        setInterval(draw, 30);
    </script>
</body>
</html>
